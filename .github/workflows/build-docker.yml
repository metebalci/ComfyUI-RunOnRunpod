name: Build and Push Docker Image

on:
  push:
    branches: [main]
    paths:
      - 'worker/**'
  schedule:
    - cron: '17 3 * * *'  # Daily at 03:17 UTC
  workflow_dispatch:  # Allow manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Compute image tag
        id: meta
        run: |
          WORKER_VERSION=$(sed -n 's/^ARG WORKER_VERSION=\(.*\)$/\1/p' worker/Dockerfile | head -1)
          if [ -z "$WORKER_VERSION" ]; then
            echo "Error: could not read WORKER_VERSION from worker/Dockerfile"
            exit 1
          fi
          PROTOCOL_VERSION=$(sed -n 's/^ARG PROTOCOL_VERSION=\(.*\)$/\1/p' worker/Dockerfile | head -1)
          if [ -z "$PROTOCOL_VERSION" ]; then
            echo "Error: could not read PROTOCOL_VERSION from worker/Dockerfile"
            exit 1
          fi
          TAG=$(git ls-remote --tags --sort=-v:refname https://github.com/comfyanonymous/ComfyUI.git 'v*' \
            | head -1 \
            | sed 's/.*refs\/tags\///' \
            | sed 's/\^{}//')
          VERSION=$(echo "${TAG#v}" | tr -d '.')
          IMAGE_TAG="${WORKER_VERSION}-p${PROTOCOL_VERSION}-comfyui${VERSION}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "worker_version=$WORKER_VERSION" >> $GITHUB_OUTPUT
          echo "protocol_version=$PROTOCOL_VERSION" >> $GITHUB_OUTPUT
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "Worker v$WORKER_VERSION (protocol $PROTOCOL_VERSION) with ComfyUI $TAG -> image tag: $IMAGE_TAG"

      - name: Check if image already exists
        id: check
        if: github.event_name == 'schedule'
        run: |
          if docker manifest inspect docker.io/metebalci/comfyui-runonrunpod:${{ steps.meta.outputs.image_tag }} > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Image already exists, skipping build"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "New tag, will build"
          fi

      - name: Set up Docker Buildx
        if: steps.check.outputs.exists != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: steps.check.outputs.exists != 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        if: steps.check.outputs.exists != 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./worker
          push: true
          build-args: |
            COMFYUI_TAG=${{ steps.meta.outputs.tag }}
            WORKER_VERSION=${{ steps.meta.outputs.worker_version }}
            PROTOCOL_VERSION=${{ steps.meta.outputs.protocol_version }}
          tags: |
            metebalci/comfyui-runonrunpod:${{ steps.meta.outputs.image_tag }}
            metebalci/comfyui-runonrunpod:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
